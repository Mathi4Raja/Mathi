<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mathi</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0f1f;
        --title: #181818;
        --title-hover: #2a2d2e;
        --top: #0f172a;
        --panel: rgba(15, 23, 42, 0.82);
        --panel-2: rgba(30, 41, 59, 0.68);
        --border: rgba(148, 163, 184, 0.22);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --ok: #22c55e;
        --info: #38bdf8;
        --warn: #f59e0b;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at top, #1e293b, var(--bg) 58%);
        color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      body { overflow: hidden; }
      .app {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: 34px 52px 1fr 26px;
      }
      .titlebar {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 10px;
        background: var(--title);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        color: #cccccc;
        padding: 0 0 0 10px;
        -webkit-app-region: drag;
        user-select: none;
      }
      .title-left {
        display: flex;
        align-items: center;
        min-width: 0;
        gap: 8px;
      }
      .appmark {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        background: linear-gradient(135deg, #00d4ff, #00b67a);
        flex: 0 0 auto;
      }
      .menu-row {
        display: flex;
        align-items: center;
        gap: 2px;
      }
      .menu-btn {
        border: 0;
        background: transparent;
        color: #cccccc;
        font-size: 13px;
        padding: 6px 10px;
        border-radius: 4px;
        cursor: pointer;
      }
      .menu-btn:hover,
      .menu-btn.active {
        background: var(--title-hover);
      }
      .window-controls {
        display: grid;
        grid-template-columns: repeat(3, 46px);
        -webkit-app-region: no-drag;
      }
      .win-btn {
        border: 0;
        background: transparent;
        color: #cccccc;
        font-size: 13px;
        height: 34px;
        cursor: pointer;
      }
      .win-btn:hover {
        background: var(--title-hover);
      }
      .win-btn.close:hover {
        background: #c42b1c;
        color: #ffffff;
      }
      .menu-pop {
        position: fixed;
        min-width: 260px;
        max-height: 70vh;
        overflow: auto;
        background: #252526;
        border: 1px solid #3c3c3c;
        border-radius: 8px;
        box-shadow: 0 10px 32px rgba(0, 0, 0, 0.45);
        z-index: 1000;
        padding: 6px;
      }
      .menu-item {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 18px;
        border: 0;
        width: 100%;
        text-align: left;
        background: transparent;
        color: #cccccc;
        border-radius: 5px;
        padding: 7px 10px;
        font-size: 13px;
        cursor: pointer;
      }
      .menu-item:hover {
        background: #094771;
        color: #ffffff;
      }
      .menu-sep {
        height: 1px;
        background: #3c3c3c;
        margin: 6px 2px;
      }
      .menu-shortcut {
        color: #9da3aa;
        font-size: 12px;
      }
      .no-drag {
        -webkit-app-region: no-drag;
      }
      .topbar, .statusbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 14px;
        background: rgba(15, 23, 42, 0.9);
        border-bottom: 1px solid var(--border);
      }
      .statusbar {
        border-top: 1px solid var(--border);
        border-bottom: 0;
        font-size: 12px;
        color: var(--muted);
      }
      .topbar .left, .topbar .right { display: flex; gap: 8px; align-items: center; }
      .pill {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.05);
      }
      .workspace {
        min-height: 0;
        display: grid;
        grid-template-columns: 260px 1fr;
      }
      .sidebar {
        border-right: 1px solid var(--border);
        background: var(--panel);
        padding: 12px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 12px;
        min-height: 0;
      }
      .section-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--muted);
      }
      .tree {
        overflow: auto;
        display: grid;
        gap: 6px;
      }
      .tree-item {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 10px;
        background: rgba(255, 255, 255, 0.04);
        cursor: pointer;
        font-size: 13px;
      }
      .tree-item.active {
        border-color: rgba(56, 189, 248, 0.5);
        background: rgba(56, 189, 248, 0.2);
      }
      .main {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: 44px 42px 1fr;
      }
      .tabs {
        display: flex;
        gap: 8px;
        align-items: center;
        overflow: auto;
        padding: 6px 10px;
        border-bottom: 1px solid var(--border);
        background: rgba(15, 23, 42, 0.62);
      }
      .tab {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 6px 10px;
        background: rgba(255, 255, 255, 0.03);
        font-size: 12px;
        cursor: pointer;
      }
      .tab.active {
        border-color: rgba(56, 189, 248, 0.5);
        background: rgba(56, 189, 248, 0.2);
      }
      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr 120px 120px;
        gap: 8px;
        padding: 6px 10px;
        border-bottom: 1px solid var(--border);
        background: rgba(15, 23, 42, 0.52);
      }
      .controls input, .controls button {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(2, 6, 23, 0.8);
        color: var(--text);
        padding: 6px 8px;
        font-size: 12px;
      }
      .content {
        min-height: 0;
        min-width: 0;
        display: grid;
        grid-template-columns: 2fr 1fr;
      }
      .editors {
        min-height: 0;
        min-width: 0;
        border-right: 1px solid var(--border);
        display: grid;
        grid-template-columns: 1fr;
      }
      .editors.split {
        grid-template-columns: 1fr 1fr;
      }
      .editor-pane {
        min-height: 0;
        padding: 10px;
      }
      .editor {
        width: 100%;
        height: 100%;
        resize: none;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(2, 6, 23, 0.85);
        color: var(--text);
        padding: 12px;
        font-family: Consolas, "SFMono-Regular", ui-monospace, monospace;
        line-height: 1.45;
      }
      .right-panel {
        min-height: 0;
        display: grid;
        grid-template-rows: 1fr 1fr;
      }
      .card {
        border-bottom: 1px solid var(--border);
        padding: 10px;
        overflow: auto;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }
      .badge {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 4px 8px;
        font-size: 11px;
      }
      .badge.ok { color: var(--ok); }
      .badge.warn { color: var(--warn); }
      .log {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(2, 6, 23, 0.8);
        padding: 8px;
        display: grid;
        gap: 6px;
        max-height: 150px;
        overflow: auto;
        font-family: Consolas, "SFMono-Regular", ui-monospace, monospace;
        font-size: 12px;
      }
      .terminal-wrap {
        display: grid;
        grid-template-rows: 1fr 36px;
        min-height: 0;
      }
      .terminal-input {
        display: grid;
        grid-template-columns: 1fr 120px;
        gap: 8px;
      }
      .terminal-input input, .terminal-input button {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(2, 6, 23, 0.8);
        color: var(--text);
        padding: 6px 8px;
      }
      @media (max-width: 1100px) {
        .workspace, .content { grid-template-columns: 1fr; }
        .sidebar { display: none; }
        .main { grid-template-rows: 44px 42px 1fr; }
        .right-panel { grid-template-rows: 220px 220px; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="titlebar" data-tauri-drag-region>
        <div class="title-left" data-tauri-drag-region>
          <div class="appmark no-drag" title="Mathi"></div>
          <nav class="menu-row no-drag" id="menuRow"></nav>
        </div>
        <div class="window-controls">
          <button class="win-btn" id="winMin" title="Minimize">-</button>
          <button class="win-btn" id="winMax" title="Maximize">[ ]</button>
          <button class="win-btn close" id="winClose" title="Close">X</button>
        </div>
      </div>
      <div class="topbar">
        <div class="left"><span class="pill">Mathi</span><span>Editor Shell</span></div>
        <div class="right"><span class="pill">P2</span><span class="pill">Leader-worker</span><span class="pill">Local-first</span></div>
      </div>
      <div class="workspace">
        <aside class="sidebar">
          <div>
            <div class="section-title">Workspace</div>
            <div class="tree" id="fileTree"></div>
          </div>
          <div class="badge ok">Runtime online</div>
        </aside>
        <main class="main">
          <div class="tabs" id="tabs"></div>
          <div class="controls">
            <input id="searchInput" type="text" placeholder="Search in active tab" />
            <input id="replaceInput" type="text" placeholder="Replace with" />
            <button id="replaceOne">Replace One</button>
            <button id="toggleSplit">Toggle Split</button>
          </div>
          <section class="content">
            <div class="editors" id="editors">
              <div class="editor-pane">
                <textarea class="editor" id="editorPrimary"></textarea>
              </div>
              <div class="editor-pane" id="secondaryPane" style="display:none;">
                <textarea class="editor" id="editorSecondary" readonly></textarea>
              </div>
            </div>
            <section class="right-panel">
              <div class="card">
                <div class="section-title">Git Basics + Diagnostics</div>
                <div class="row">
                  <span class="badge" id="branchBadge">branch: main</span>
                  <span class="badge" id="dirtyBadge">changes: 0</span>
                  <button id="refreshGit" class="badge" style="cursor:pointer; background:rgba(255,255,255,0.04);">refresh</button>
                </div>
                <div class="log" id="diagLog"></div>
              </div>
              <div class="card terminal-wrap">
                <div>
                  <div class="section-title">Terminal</div>
                  <div class="log" id="terminalLog"></div>
                </div>
                <div class="terminal-input">
                  <input id="terminalInput" type="text" placeholder="Type command (simulated)" />
                  <button id="runTerminal">Run</button>
                </div>
              </div>
            </section>
          </section>
        </main>
      </div>
      <div class="statusbar">
        <div>Workspace: local only · process isolation v1</div>
        <div>P2 surface: tree · tabs · split · search/replace · terminal · git panel · diagnostics</div>
      </div>
    </div>
    <script>
      const files = {};
      const openTabs = [];
      let activeTab = null;
      let split = false;
      let workspaceFiles = [];
      let gitSnapshot = { branch: "unknown", dirty_count: 0, summary: [] };
      const initialSnapshots = new Map();

      const fileTree = document.getElementById("fileTree");
      const tabs = document.getElementById("tabs");
      const editorPrimary = document.getElementById("editorPrimary");
      const editorSecondary = document.getElementById("editorSecondary");
      const editors = document.getElementById("editors");
      const secondaryPane = document.getElementById("secondaryPane");
      const terminalCard = document.querySelector(".terminal-wrap");
      const diagLog = document.getElementById("diagLog");
      const terminalLog = document.getElementById("terminalLog");
      const dirtyBadge = document.getElementById("dirtyBadge");
      const menuRow = document.getElementById("menuRow");
      const terminalInput = document.getElementById("terminalInput");
      let menuPopover = null;
      let activeMenuButton = null;

      function invokeTauri(command, payload = {}) {
        const invoke = window.__TAURI__?.core?.invoke;
        if (typeof invoke !== "function") {
          return Promise.reject(new Error("Tauri bridge unavailable"));
        }
        return invoke(command, payload);
      }

      function workspacePathLabel(path) {
        return path.replace(/\\/g, "/");
      }

      function clearTerminal() {
        terminalLog.innerHTML = "";
      }

      function appendTerminalBlock(text) {
        String(text)
          .split(/\r?\n/)
          .filter(Boolean)
          .forEach((line) => appendLog(terminalLog, line));
      }

      function selectActiveEditorLine(lineNumber) {
        if (!activeTab || !Number.isFinite(lineNumber) || lineNumber < 1) {
          return;
        }

        const text = editorPrimary.value;
        const lines = text.split(/\r?\n/);
        const targetIndex = Math.min(lineNumber - 1, Math.max(lines.length - 1, 0));
        let offset = 0;
        for (let index = 0; index < targetIndex; index += 1) {
          offset += lines[index].length + 1;
        }

        editorPrimary.focus();
        editorPrimary.setSelectionRange(offset, offset);
        editorPrimary.scrollTop = Math.max(0, offset - 80);
      }

      async function readWorkspaceFile(path) {
        const content = await invokeTauri("workspace_read_file", { path });
        files[path] = content;
        if (!initialSnapshots.has(path)) {
          initialSnapshots.set(path, content);
        }
        return content;
      }

      async function saveWorkspaceFile(path, content) {
        await invokeTauri("workspace_write_file", { path, content });
        initialSnapshots.set(path, content);
        files[path] = content;
        refreshGitBadge();
      }

      async function runWorkspaceCommand(command) {
        const result = await invokeTauri("workspace_run_command", { command, cwd: activeTab ? "" : null });
        appendTerminalBlock(`> ${result.command}`);
        if (result.stdout) {
          appendTerminalBlock(result.stdout.trim());
        }
        if (result.stderr) {
          appendTerminalBlock(result.stderr.trim());
        }
        appendLog(terminalLog, `[exit ${result.exit_code}]`);
        return result;
      }

      async function refreshGitStatus() {
        try {
          gitSnapshot = await invokeTauri("workspace_git_status");
          branchBadge.textContent = `branch: ${gitSnapshot.branch}`;
          dirtyBadge.textContent = `changes: ${gitSnapshot.dirty_count}`;
          appendLog(diagLog, `git: ${gitSnapshot.branch} · ${gitSnapshot.dirty_count} change(s)`);
          gitSnapshot.summary.slice(0, 12).forEach((line) => appendLog(diagLog, `git: ${line}`));
        } catch (error) {
          appendLog(diagLog, `[git] refresh failed: ${error.message}`);
        }
      }

      async function reloadWorkspaceFiles(preferredPath) {
        workspaceFiles = [];
        try {
          const snapshot = await invokeTauri("workspace_list_files");
          workspaceFiles = snapshot.map((entry) => workspacePathLabel(entry.path || entry));
          renderTree();

          const fallback = preferredPath || workspaceFiles.find((path) => path.endsWith("src-tauri/src/main.rs")) || workspaceFiles[0];
          if (fallback) {
            await openFile(fallback, true);
          }
        } catch (error) {
          appendLog(diagLog, `[workspace] load failed: ${error.message}`);
        }
      }

      async function openFile(path, forceReload = false) {
        const normalized = workspacePathLabel(path);
        if (!workspaceFiles.includes(normalized)) {
          workspaceFiles.push(normalized);
          workspaceFiles.sort();
          renderTree();
        }

        if (forceReload || !files[normalized]) {
          await readWorkspaceFile(normalized);
        }

        if (!openTabs.includes(normalized)) {
          openTabs.push(normalized);
        }

        activeTab = normalized;
        editorPrimary.value = files[normalized] || "";
        updateSecondary();
        renderTree();
        renderTabs();
        refreshDiagnostics();
      }

      function newScratchBuffer() {
        const scratchPath = `scratch/untitled-${Date.now()}.txt`;
        files[scratchPath] = "";
        initialSnapshots.set(scratchPath, "");
        openTabs.push(scratchPath);
        activeTab = scratchPath;
        editorPrimary.value = "";
        updateSecondary();
        renderTree();
        renderTabs();
        refreshDiagnostics();
        refreshGitBadge();
      }

      function closeActiveTab() {
        if (!activeTab) {
          return;
        }

        const index = openTabs.indexOf(activeTab);
        openTabs.splice(index, 1);
        delete files[activeTab];
        initialSnapshots.delete(activeTab);
        activeTab = openTabs[index] || openTabs[index - 1] || null;

        if (activeTab) {
          editorPrimary.value = files[activeTab] || "";
        } else {
          editorPrimary.value = "";
        }

        updateSecondary();
        renderTree();
        renderTabs();
        refreshDiagnostics();
        refreshGitBadge();
      }

      async function saveActiveFile(forceNewPath = false) {
        if (!activeTab) {
          return;
        }

        const currentContent = editorPrimary.value;
        const targetPath = forceNewPath
          ? prompt("Save workspace file as", activeTab)
          : activeTab;

        if (!targetPath) {
          return;
        }

        const normalized = workspacePathLabel(targetPath);
        await saveWorkspaceFile(normalized, currentContent);
        if (normalized !== activeTab) {
          delete files[activeTab];
          initialSnapshots.delete(activeTab);
          openTabs[openTabs.indexOf(activeTab)] = normalized;
          activeTab = normalized;
        }
        refreshDiagnostics();
      }

      async function openWorkspaceFileFromPrompt() {
        const target = prompt("Open workspace file", activeTab || workspaceFiles[0] || "src-tauri/src/main.rs");
        if (!target) {
          return;
        }
        await openFile(target);
      }

      function toggleTerminalVisibility() {
        const hidden = terminalCard.style.display === "none";
        terminalCard.style.display = hidden ? "grid" : "none";
      }

      const menuModel = [
        ["File", [
          { id: "new_text_file", label: "New Text File", shortcut: "Ctrl+N" },
          { id: "new_file", label: "New File..." },
          { type: "sep" },
          { id: "open_file", label: "Open File...", shortcut: "Ctrl+O" },
          { id: "open_folder", label: "Open Folder..." },
          { type: "sep" },
          { id: "save_file", label: "Save", shortcut: "Ctrl+S" },
          { id: "save_file_as", label: "Save As...", shortcut: "Ctrl+Shift+S" },
          { type: "sep" },
          { id: "close_editor", label: "Close Editor", shortcut: "Ctrl+W" },
          { id: "exit_app", label: "Exit", shortcut: "Alt+F4" }
        ]],
        ["Edit", [
          { id: "undo", label: "Undo", shortcut: "Ctrl+Z" },
          { id: "redo", label: "Redo", shortcut: "Ctrl+Y" },
          { type: "sep" },
          { id: "cut", label: "Cut", shortcut: "Ctrl+X" },
          { id: "copy", label: "Copy", shortcut: "Ctrl+C" },
          { id: "paste", label: "Paste", shortcut: "Ctrl+V" },
          { type: "sep" },
          { id: "find", label: "Find", shortcut: "Ctrl+F" },
          { id: "replace", label: "Replace", shortcut: "Ctrl+H" }
        ]],
        ["Selection", [
          { id: "select_all", label: "Select All", shortcut: "Ctrl+A" },
          { id: "expand_selection", label: "Expand Selection" },
          { id: "shrink_selection", label: "Shrink Selection" },
          { id: "selection_column", label: "Column Selection Mode" }
        ]],
        ["View", [
          { id: "command_palette", label: "Command Palette...", shortcut: "Ctrl+Shift+P" },
          { type: "sep" },
          { id: "toggle_split", label: "Toggle Editor Group", shortcut: "Ctrl+\\" },
          { id: "toggle_terminal", label: "Toggle Terminal" },
          { type: "sep" },
          { id: "refresh_git", label: "Refresh Git Status" }
        ]],
        ["Go", [
          { id: "go_back", label: "Back", shortcut: "Alt+Left" },
          { id: "go_forward", label: "Forward", shortcut: "Alt+Right" },
          { type: "sep" },
          { id: "go_to_file", label: "Go to File...", shortcut: "Ctrl+P" },
          { id: "go_to_line", label: "Go to Line...", shortcut: "Ctrl+G" }
        ]],
        ["Run", [
          { id: "run_start", label: "Start Debugging", shortcut: "F5" },
          { id: "run_without_debug", label: "Run Without Debugging", shortcut: "Ctrl+F5" },
          { id: "run_stop", label: "Stop Debugging", shortcut: "Shift+F5" }
        ]],
        ["Terminal", [
          { id: "terminal_new", label: "New Terminal" },
          { id: "terminal_split", label: "Split Terminal" },
          { type: "sep" },
          { id: "terminal_clear", label: "Clear Terminal" }
        ]],
        ["Help", [
          { id: "welcome", label: "Welcome" },
          { id: "documentation", label: "Documentation" },
          { id: "keyboard_shortcuts", label: "Keyboard Shortcuts" },
          { type: "sep" },
          { id: "about_mathi", label: "About Mathi" }
        ]]
      ];

      function appendLog(el, text) {
        const line = document.createElement("div");
        line.textContent = text;
        el.appendChild(line);
        el.scrollTop = el.scrollHeight;
      }

      function clearMenuPopover() {
        if (menuPopover) {
          menuPopover.remove();
          menuPopover = null;
        }
        if (activeMenuButton) {
          activeMenuButton.classList.remove("active");
          activeMenuButton = null;
        }
      }

      function handleMenuAction(id) {
        const actions = {
          new_text_file: () => newScratchBuffer(),
          new_file: () => {
            const path = prompt("Create workspace file", "scratch/new-file.txt");
            if (!path) return;
            files[workspacePathLabel(path)] = "";
            initialSnapshots.set(workspacePathLabel(path), "");
            void openFile(path, true);
          },
          open_file: () => void openWorkspaceFileFromPrompt(),
          open_folder: () => void reloadWorkspaceFiles(activeTab),
          save_file: () => void saveActiveFile(),
          save_file_as: () => void saveActiveFile(true),
          close_editor: () => closeActiveTab(),
          exit_app: () => {
            const appWindow = window.__TAURI__?.window?.getCurrentWindow?.();
            if (appWindow) {
              appWindow.close();
            } else {
              window.close();
            }
          },
          undo: () => document.execCommand("undo"),
          redo: () => document.execCommand("redo"),
          cut: () => document.execCommand("cut"),
          copy: () => document.execCommand("copy"),
          paste: () => document.execCommand("paste"),
          find: () => document.getElementById("searchInput").focus(),
          replace: () => document.getElementById("replaceInput").focus(),
          select_all: () => editorPrimary.select(),
          expand_selection: () => editorPrimary.focus(),
          shrink_selection: () => editorPrimary.setSelectionRange(editorPrimary.selectionEnd, editorPrimary.selectionEnd),
          selection_column: () => appendLog(diagLog, "selection: column mode toggled"),
          command_palette: () => appendLog(diagLog, "command palette: use menus and search inputs"),
          toggle_split: () => document.getElementById("toggleSplit").click(),
          toggle_terminal: () => toggleTerminalVisibility(),
          refresh_git: () => document.getElementById("refreshGit").click(),
          go_back: () => {
            const index = openTabs.indexOf(activeTab);
            if (index > 0) void openFile(openTabs[index - 1]);
          },
          go_forward: () => {
            const index = openTabs.indexOf(activeTab);
            if (index >= 0 && index < openTabs.length - 1) void openFile(openTabs[index + 1]);
          },
          go_to_file: () => void openWorkspaceFileFromPrompt(),
          go_to_line: () => {
            const line = Number.parseInt(prompt("Go to line", "1") || "1", 10);
            selectActiveEditorLine(line);
          },
          run_start: () => terminalInput.focus(),
          run_without_debug: () => terminalInput.focus(),
          run_stop: () => appendLog(terminalLog, "run: stop requested"),
          terminal_new: () => {
            clearTerminal();
            appendLog(terminalLog, `terminal session ${++terminalSession}`);
          },
          terminal_split: () => appendLog(terminalLog, "terminal: split session available in this panel"),
          terminal_clear: () => clearTerminal(),
          welcome: () => void openWorkspaceFileFromPrompt(),
          documentation: () => void openWorkspaceFileFromPrompt(),
          keyboard_shortcuts: () => appendLog(diagLog, "shortcuts: use the menu bar and standard editor shortcuts"),
          about_mathi: () => appendLog(diagLog, "Mathi: local-first editor shell running against real workspace files"),
        };

        const action = actions[id];
        if (action) {
          action();
        }
      }

      function openMenu(buttonEl, items) {
        clearMenuPopover();
        activeMenuButton = buttonEl;
        activeMenuButton.classList.add("active");

        const rect = buttonEl.getBoundingClientRect();
        menuPopover = document.createElement("div");
        menuPopover.className = "menu-pop";
        menuPopover.style.left = `${Math.round(rect.left)}px`;
        menuPopover.style.top = `${Math.round(rect.bottom + 2)}px`;

        items.forEach((item) => {
          if (item.type === "sep") {
            const sep = document.createElement("div");
            sep.className = "menu-sep";
            menuPopover.appendChild(sep);
            return;
          }
          const row = document.createElement("button");
          row.className = "menu-item";
          row.innerHTML = `<span>${item.label}</span><span class="menu-shortcut">${item.shortcut || ""}</span>`;
          row.onclick = () => {
            handleMenuAction(item.id);
            clearMenuPopover();
          };
          menuPopover.appendChild(row);
        });

        document.body.appendChild(menuPopover);
      }

      function renderCustomMenuBar() {
        menuRow.innerHTML = "";
        menuModel.forEach(([title, items]) => {
          const button = document.createElement("button");
          button.className = "menu-btn";
          button.textContent = title;
          button.onclick = (event) => {
            event.stopPropagation();
            if (activeMenuButton === button) {
              clearMenuPopover();
            } else {
              openMenu(button, items);
            }
          };
          menuRow.appendChild(button);
        });
      }

      function renderTree() {
        fileTree.innerHTML = "";
        workspaceFiles.forEach((path) => {
          const node = document.createElement("div");
          node.className = `tree-item ${activeTab === path ? "active" : ""}`;
          node.textContent = path;
          node.onclick = () => openFile(path);
          fileTree.appendChild(node);
        });
      }

      function renderTabs() {
        tabs.innerHTML = "";
        openTabs.forEach((path) => {
          const tab = document.createElement("div");
          tab.className = `tab ${activeTab === path ? "active" : ""}`;
          tab.textContent = path.split("/").pop();
          tab.onclick = () => setActive(path);
          tabs.appendChild(tab);
        });
      }

      function openFile(path) {
        void (async () => {
          const normalized = workspacePathLabel(path);
          if (!openTabs.includes(normalized)) {
            openTabs.push(normalized);
          }
          await readWorkspaceFile(normalized);
          setActive(normalized);
        })();
      }

      function setActive(path) {
        activeTab = path;
        editorPrimary.value = files[path] || "";
        updateSecondary();
        renderTree();
        renderTabs();
        refreshDiagnostics();
        void refreshGitStatus();
      }

      function updateSecondary() {
        if (!split || !activeTab) {
          editorSecondary.value = "";
          return;
        }
        editorSecondary.value = `Preview (read-only)\n\n${files[activeTab] || ""}`;
      }

      function refreshDiagnostics() {
        diagLog.innerHTML = "";
        if (!activeTab) {
          return;
        }
        const source = files[activeTab] || "";
        const openBraces = (source.match(/\{/g) || []).length;
        const closeBraces = (source.match(/\}/g) || []).length;
        if (openBraces !== closeBraces) {
          appendLog(diagLog, `warn: brace mismatch (${openBraces} open, ${closeBraces} close)`);
        } else {
          appendLog(diagLog, "ok: brace balance looks good");
        }
        if (source.includes("TODO")) {
          appendLog(diagLog, "info: TODO markers found");
        }
        appendLog(diagLog, `lsp-lite: active tab ${activeTab}`);
      }

      function refreshGitBadge() {
        let dirty = 0;
        for (const [path, content] of Object.entries(files)) {
          if ((initialSnapshots.get(path) || "") !== content) {
            dirty += 1;
          }
        }
        dirtyBadge.textContent = `changes: ${dirty}`;
      }

      document.getElementById("replaceOne").onclick = () => {
        if (!activeTab) return;
        const search = document.getElementById("searchInput").value;
        const replace = document.getElementById("replaceInput").value;
        if (!search) return;
        const current = files[activeTab] || "";
        const index = current.indexOf(search);
        if (index < 0) {
          appendLog(terminalLog, `[replace] no match: ${search}`);
          return;
        }
        files[activeTab] = current.slice(0, index) + replace + current.slice(index + search.length);
        editorPrimary.value = files[activeTab];
        updateSecondary();
        refreshDiagnostics();
        refreshGitBadge();
        appendLog(terminalLog, `[replace] ${search} -> ${replace}`);
      };

      document.getElementById("toggleSplit").onclick = () => {
        split = !split;
        if (split) {
          editors.classList.add("split");
          secondaryPane.style.display = "block";
        } else {
          editors.classList.remove("split");
          secondaryPane.style.display = "none";
        }
        updateSecondary();
      };

      async function executeTerminalInput() {
        const command = terminalInput.value.trim();
        if (!command) return;
        terminalInput.value = "";
        try {
          await runWorkspaceCommand(command);
        } catch (error) {
          appendLog(terminalLog, `[terminal] ${error.message}`);
        }
      }

      document.getElementById("runTerminal").onclick = () => {
        void executeTerminalInput();
      };

      document.getElementById("refreshGit").onclick = () => {
        refreshGitBadge();
        void refreshGitStatus();
      };

      document.addEventListener("click", (event) => {
        if (!menuPopover) return;
        const insidePopover = menuPopover.contains(event.target);
        const insideMenuRow = menuRow.contains(event.target);
        if (!insidePopover && !insideMenuRow) {
          clearMenuPopover();
        }
      });

      async function invokeWindowControl(action) {
        const invoke = window.__TAURI__?.core?.invoke;
        if (typeof invoke === "function") {
          return invoke("window_control", { action });
        }

        const appWindow = window.__TAURI__?.window?.getCurrentWindow?.();
        if (!appWindow) {
          throw new Error("Tauri bridge unavailable");
        }

        if (action === "minimize") {
          return appWindow.minimize();
        }
        if (action === "maximize") {
          return appWindow.toggleMaximize();
        }
        if (action === "restore") {
          return appWindow.unmaximize();
        }
        if (action === "close") {
          return appWindow.close();
        }

        throw new Error(`unknown window action: ${action}`);
      }

      async function isWindowMaximized() {
        const invoke = window.__TAURI__?.core?.invoke;
        if (typeof invoke === "function") {
          return Boolean(await invoke("window_is_maximized"));
        }

        const appWindow = window.__TAURI__?.window?.getCurrentWindow?.();
        if (!appWindow) {
          return false;
        }

        return Boolean(await appWindow.isMaximized());
      }

      function updateWindowMaxButton(isMaximized) {
        const maxButton = document.getElementById("winMax");
        if (!maxButton) {
          return;
        }

        maxButton.textContent = isMaximized ? "❐" : "[ ]";
        maxButton.title = isMaximized ? "Restore" : "Maximize";
        maxButton.setAttribute("aria-label", maxButton.title);
      }

      async function syncWindowMaxButton() {
        try {
          updateWindowMaxButton(await isWindowMaximized());
        } catch (error) {
          appendLog(terminalLog, `[window] state sync failed: ${error.message}`);
        }
      }

      appendLog(terminalLog, `bridge: ${window.__TAURI__?.core?.invoke ? "ready" : "missing"}`);

      document.getElementById("winMin").onclick = () => {
        invokeWindowControl("minimize").catch((error) => appendLog(terminalLog, `[window] minimize failed: ${error.message}`));
      };
      document.getElementById("winMax").onclick = async () => {
        try {
          const maximizedBeforeClick = await isWindowMaximized();
          await invokeWindowControl(maximizedBeforeClick ? "restore" : "maximize");
          updateWindowMaxButton(!(maximizedBeforeClick));
        } catch (error) {
          appendLog(terminalLog, `[window] maximize failed: ${error.message}`);
        }
      };
      document.getElementById("winClose").onclick = () => {
        invokeWindowControl("close").catch((error) => appendLog(terminalLog, `[window] close failed: ${error.message}`));
      };

      const tauriEvent = window.__TAURI__?.event;
      if (tauriEvent?.listen) {
        tauriEvent.listen("dev-reload", () => {
          appendLog(terminalLog, "dev: hot reload triggered");
          window.location.reload();
        });
      }

      editorPrimary.addEventListener("input", () => {
        if (!activeTab) return;
        files[activeTab] = editorPrimary.value;
        updateSecondary();
        refreshDiagnostics();
        refreshGitBadge();
      });

      terminalInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          void executeTerminalInput();
        }
      });

      window.addEventListener("keydown", (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s") {
          event.preventDefault();
          void saveActiveFile();
        }
      });

      appendLog(terminalLog, "bootstrap: editor shell ready");
      appendLog(terminalLog, "ipc: bounded queue online");
      appendLog(terminalLog, "policy: balanced defaults active");
      renderCustomMenuBar();
      syncWindowMaxButton();
      void reloadWorkspaceFiles("src-tauri/src/main.rs");
      refreshGitBadge();
    </script>
  </body>
</html>
