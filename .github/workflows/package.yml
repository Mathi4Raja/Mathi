name: package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  pre-release-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run pre-release validation probes
        run: |
          chmod +x scripts/pre_release_validation.sh
          ./scripts/pre_release_validation.sh

  package:
    needs: pre-release-validation
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact_suffix: windows
          - os: macos-14
            artifact_suffix: macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build bundle
        working-directory: src-tauri
        run: cargo tauri build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mathi-${{ matrix.artifact_suffix }}
          path: |
            src-tauri/target/**/bundle/**

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate checksums
        run: |
          find release-artifacts -type f -print0 | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Generate release notes
        run: |
          chmod +x scripts/release_notes.sh
          scripts/release_notes.sh "${GITHUB_REF_NAME}" > RELEASE_NOTES.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            release-artifacts/**
            SHA256SUMS.txt
